apis:
  - name: Dead Drop API v1
    description: >-
      Privacy-focused, ephemeral data-sharing API v1. Provides CRUD operations for drops (text-only ephemeral shares),
      random unused drop-name generation, availability checks, and version history. Free tier drops are 10KB with a
      7-day lifespan; Deep tier drops are 4MB with a 90-day lifespan. Private drops use client-side AES-GCM encryption
      (zero-knowledge); public drops are plaintext.
    humanURL: https://davorinrusevljan.github.io/dead-drop/latest/
    baseURL: https://api.dead-drop.xyz/api/v1
    image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
    tags:
